  <text x="262" y="130" fill="#f4f6f8" font-family="Arial, sans-serif" font-size="35" font-weight="700">Lead operations</text>
  <text x="262" y="164" fill="#758397" font-family="Arial, sans-serif" font-size="16">Snapshot before the connected growth system</text>
