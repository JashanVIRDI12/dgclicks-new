    <text x="28" y="122" fill="#f2f4f7" font-family="Arial, sans-serif" font-size="72" font-weight="700">8</text>
    <text x="104" y="120" fill="#9b6f62" font-family="Arial, sans-serif" font-size="16">inconsistent</text>
    <path d="M270 128l20-16 22 11 25-30" fill="none" stroke="#9b6f62" stroke-width="5" stroke-linecap="round"/>
  </g>
