      <rect x="26" y="302" width="398" height="78" rx="10" fill="#141f2d"/><circle cx="56" cy="341" r="12" fill="#3a4656"/><text x="82" y="335" fill="#bbc4cf" font-size="15">Referral</text><text x="82" y="359" fill="#758397" font-size="13">No campaign context</text><text x="322" y="348" fill="#8c7780" font-size="12">UNTRACKED</text>
    </g>
