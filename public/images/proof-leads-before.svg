<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Lead dashboard before campaign improvements</title>
  <desc id="desc">A dark lead dashboard showing eight qualified enquiries per month and a fragmented enquiry pipeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111b29"/><stop offset="1" stop-color="#070d16"/></linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M60 0H0V60" fill="none" stroke="#fff" stroke-opacity=".025"/></pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="214" height="1000" fill="#09111d"/>
  <rect x="33" y="37" width="46" height="46" rx="11" fill="#283446"/>
